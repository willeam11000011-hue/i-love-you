<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ sZ (Sahabat ZUZU) ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a001a, #1a0a3e, #0d1b4e, #162447);
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-emoji {
            position: absolute;
            bottom: -50px;
            animation: floatUp linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh) rotate(360deg) scale(0.5);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .big-emoji {
            font-size: 90px;
            animation: bounce 2s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(100, 200, 255, 0.8));
            margin-bottom: 20px;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            25% {
                transform: translateY(-15px) scale(1.05);
            }

            50% {
                transform: translateY(0) scale(1);
            }

            75% {
                transform: translateY(-10px) scale(1.03);
            }
        }

        .main-text {
            font-size: clamp(3.5rem, 14vw, 9rem);
            font-weight: bold;
            background: linear-gradient(45deg, #00d2ff, #7b2faf, #ff6ec7, #00d2ff, #7b2faf);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            filter: drop-shadow(0 0 25px rgba(123, 47, 175, 0.6));
            letter-spacing: 8px;
            line-height: 1.2;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .subtitle {
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            font-weight: bold;
            background: linear-gradient(90deg, #ffd700, #ff6ec7, #00d2ff, #ffd700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            margin-top: 15px;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
        }

        .tagline {
            font-size: clamp(0.9rem, 3vw, 1.5rem);
            color: rgba(200, 180, 255, 0.8);
            margin-top: 25px;
            animation: fadeInUp 2s ease forwards;
            opacity: 0;
            animation-delay: 1.5s;
            font-style: italic;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sparkle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .glow-ring {
            position: absolute;
            border: 2px solid rgba(100, 200, 255, 0.2);
            border-radius: 50%;
            animation: glowPulse 3s ease-in-out infinite;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .glow-ring:nth-child(1) {
            width: 300px;
            height: 300px;
        }

        .glow-ring:nth-child(2) {
            width: 420px;
            height: 420px;
            animation-delay: 0.5s;
            border-color: rgba(123, 47, 175, 0.2);
        }

        .glow-ring:nth-child(3) {
            width: 540px;
            height: 540px;
            animation-delay: 1s;
            border-color: rgba(255, 110, 199, 0.2);
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.08);
            }
        }

        .star {
            position: fixed;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes twinkle {
            from {
                opacity: 0.2;
            }

            to {
                opacity: 1;
            }
        }

        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: orbit linear infinite;
            z-index: 2;
        }

        @keyframes orbit {
            0% {
                transform: rotate(0deg) translateX(80px) rotate(0deg);
                opacity: 0.8;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: rotate(360deg) translateX(80px) rotate(-360deg);
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <div class="stars-bg" id="starsBg"></div>
    <div class="sparkle-container" id="sparkles"></div>

    <div class="container">
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>

        <div class="big-emoji">🧚✨👑</div>
        <div class="main-text">sZ</div>
        <div class="subtitle">( Sahabat ZUZU )</div>
        <p class="tagline">Friendship that shines forever 💫🤝✨</p>
    </div>

    <script>
        function createFloatingEmojis() {
            const container = document.getElementById('starsBg');
            const emojis = ['✨', '💫', '⭐', '🌟', '👑', '🧚', '💜', '🦋', '🌸', '💎'];
            for (let i = 0; i < 25; i++) {
                const el = document.createElement('div');
                el.className = 'floating-emoji';
                el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = (15 + Math.random() * 25) + 'px';
                el.style.animationDuration = (6 + Math.random() * 8) + 's';
                el.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(el);
            }
        }

        function createSparkles() {
            const container = document.getElementById('sparkles');
            for (let i = 0; i < 50; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 3 + 's';
                sparkle.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                container.appendChild(sparkle);
            }
        }

        function createStars() {
            for (let i = 0; i < 70; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                document.body.appendChild(star);
            }
        }

        function createParticles() {
            const colors = ['#00d2ff', '#7b2faf', '#ff6ec7', '#ffd700', '#ffffff'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (3 + Math.random() * 5) + 's';
                p.style.animationDelay = Math.random() * 3 + 's';
                const dist = 60 + Math.random() * 200;
                p.style.setProperty('--orbit-dist', dist + 'px');
                document.body.appendChild(p);
            }
        }

        createStars();
        createFloatingEmojis();
        createSparkles();
        createParticles();

        document.addEventListener('click', (e) => {
            const emojis = ['✨', '💫', '⭐', '💜', '🧚'];
            for (let i = 0; i < 6; i++) {
                const el = document.createElement('div');
                el.className = 'floating-emoji';
                el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = e.clientX + 'px';
                el.style.bottom = (window.innerHeight - e.clientY) + 'px';
                el.style.fontSize = (20 + Math.random() * 20) + 'px';
                el.style.animationDuration = (3 + Math.random() * 3) + 's';
                el.style.position = 'fixed';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 6000);
            }
        });
    </script>
</body>

</html>
