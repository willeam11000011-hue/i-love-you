<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ I Love You sZ`MPUT🧚 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d0015, #1a0a2e, #2d1b4e);
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        /* Floating hearts background */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            bottom: -50px;
            font-size: 20px;
            animation: floatUp linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh) rotate(360deg) scale(0.5);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        /* Big heart */
        .big-heart {
            font-size: 100px;
            animation: heartbeat 1.2s ease-in-out infinite;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(255, 0, 100, 0.8));
            margin-bottom: 20px;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.15);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.1);
            }
        }

        /* Main text */
        .love-text {
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b9d, #ff2d7b, #ff69b4, #ff1493, #ff6b9d);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.5));
            letter-spacing: 5px;
            line-height: 1.2;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .subtitle {
            font-size: clamp(1rem, 4vw, 2rem);
            color: rgba(255, 182, 213, 0.8);
            margin-top: 20px;
            animation: fadeInUp 2s ease forwards;
            opacity: 0;
            animation-delay: 1s;
            font-style: italic;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Sparkle effect */
        .sparkle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Rose petals */
        .petal {
            position: fixed;
            width: 15px;
            height: 15px;
            background: radial-gradient(circle, #ff6b9d, #ff2d7b);
            border-radius: 50% 0 50% 50%;
            animation: petalFall linear infinite;
            opacity: 0.7;
            z-index: 1;
        }

        @keyframes petalFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) translateX(0);
                opacity: 0.7;
            }

            25% {
                transform: translateY(25vh) rotate(90deg) translateX(30px);
            }

            50% {
                transform: translateY(50vh) rotate(180deg) translateX(-20px);
            }

            75% {
                transform: translateY(75vh) rotate(270deg) translateX(25px);
            }

            100% {
                transform: translateY(110vh) rotate(360deg) translateX(0);
                opacity: 0;
            }
        }

        /* Extra glow ring */
        .glow-ring {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 2px solid rgba(255, 105, 180, 0.3);
            border-radius: 50%;
            animation: glowPulse 3s ease-in-out infinite;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .glow-ring:nth-child(2) {
            width: 400px;
            height: 400px;
            animation-delay: 0.5s;
        }

        .glow-ring:nth-child(3) {
            width: 500px;
            height: 500px;
            animation-delay: 1s;
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* Stars twinkling */
        .star {
            position: fixed;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes twinkle {
            from {
                opacity: 0.2;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="hearts-bg" id="heartsBg"></div>
    <div class="sparkle-container" id="sparkles"></div>

    <div class="container">
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>
        <div class="glow-ring"></div>

        <div class="big-heart">❤️</div>
        <div class="love-text">I Love You sZ`MPUT🧚</div>
        <p class="subtitle">Forever and Always ✨💕</p>
    </div>

    <script>
        // Create floating hearts
        function createFloatingHearts() {
            const container = document.getElementById('heartsBg');
            const hearts = ['❤️', '💕', '💗', '💖', '💘', '💝', '💞', '🌹'];
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (15 + Math.random() * 25) + 'px';
                heart.style.animationDuration = (6 + Math.random() * 8) + 's';
                heart.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(heart);
            }
        }

        // Create sparkles
        function createSparkles() {
            const container = document.getElementById('sparkles');
            for (let i = 0; i < 40; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 3 + 's';
                sparkle.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                container.appendChild(sparkle);
            }
        }

        // Create falling petals
        function createPetals() {
            for (let i = 0; i < 15; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDuration = (5 + Math.random() * 7) + 's';
                petal.style.animationDelay = Math.random() * 8 + 's';
                petal.style.width = (8 + Math.random() * 12) + 'px';
                petal.style.height = petal.style.width;
                document.body.appendChild(petal);
            }
        }

        // Create stars
        function createStars() {
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                document.body.appendChild(star);
            }
        }

        createStars();
        createFloatingHearts();
        createSparkles();
        createPetals();

        // Touch/click interaction - spawn hearts
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 5; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerText = '❤️';
                heart.style.left = e.clientX + 'px';
                heart.style.bottom = (window.innerHeight - e.clientY) + 'px';
                heart.style.fontSize = (20 + Math.random() * 20) + 'px';
                heart.style.animationDuration = (3 + Math.random() * 3) + 's';
                heart.style.position = 'fixed';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }
        });
    </script>
</body>

</html>
